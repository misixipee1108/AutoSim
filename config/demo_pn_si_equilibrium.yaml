  - "Constants q,kB,eps_0: NIST CODATA 2018"
  - "Doping Na=1e18 Nd=1e16 cm^-3 abrupt junction: Sze & Ng (2012) Ch. 2"
  - "Numerical FDM central difference + damped Newton-Raphson"

